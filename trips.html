<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Blue Star Limo</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { text-align: center; }

    /* ── Login ── */
    #login {
      max-width: 380px;
      margin: 120px auto 0;
      padding: 40px 36px;
      background: #112032;
      border: 1px solid #1e3352;
    }
    #login h2 {
      color: #c9a84c;
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 0 6px;
    }
    #login p {
      color: #7a9ab8;
      font-size: 12px;
      margin: 0 0 28px;
    }
    #login input {
      width: 100%;
      padding: 13px 16px;
      margin-bottom: 14px;
      background: #0d1b2a;
      border: 1px solid #1e3352;
      color: #fff;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.3s;
    }
    #login input:focus { border-color: #c9a84c; }
    #login button {
      width: 100%;
      padding: 14px;
      background: #c9a84c;
      color: #000;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.3s;
    }
    #login button:hover { background: #e0c46c; }
    #login-error {
      color: #e55;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; padding: 0 30px 60px; }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1100px;
      margin: 0 auto 32px;
      padding-top: 10px;
      border-bottom: 1px solid #1e3352;
      padding-bottom: 20px;
    }
    .dash-header h1 {
      font-size: 22px;
      color: #c9a84c;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0;
    }
    .logout-btn {
      background: none;
      border: 1px solid #1e3352;
      color: #7a9ab8;
      padding: 8px 18px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    .logout-btn:hover { border-color: #7a9ab8; color: #fff; }

    .dash-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto 28px;
    }
    .dash-controls select {
      padding: 10px 16px;
      background: #112032;
      border: 1px solid #1e3352;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    .dash-controls button {
      padding: 10px 24px;
      background: #c9a84c;
      color: #000;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.3s;
    }
    .dash-controls button:hover { background: #e0c46c; }

    .trip-count {
      text-align: left;
      max-width: 1100px;
      margin: 0 auto 12px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a5a7a;
    }

    /* ── Table ── */
    .table-wrap {
      max-width: 1100px;
      margin: 0 auto;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead tr { background: #112032; }
    th {
      background: linear-gradient(135deg, #1a3a5c, #0f2a44);
      color: #c9a84c;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 16px;
      white-space: nowrap;
      border-bottom: 2px solid #c9a84c;
    }
    td {
      padding: 13px 16px;
      border-bottom: 1px solid #1a2f45;
      color: #a8c0d6;
      text-align: left;
      white-space: nowrap;
    }
    tbody tr:hover { background: #112032; }
    tbody tr:hover td { color: #fff; }
    td.price { color: #c9a84c; font-weight: 600; }

    .btn-invoice {
      display: inline-block;
      padding: 7px 14px;
      background: none;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      margin-right: 6px;
    }
    .btn-invoice:hover { background: #c9a84c; color: #000; }

    .btn-delete {
      display: inline-block;
      padding: 7px 14px;
      background: none;
      border: 1px solid #4a2222;
      color: #cc4444;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-delete:hover { background: #cc4444; border-color: #cc4444; color: #fff; }

    .no-trips {
      color: #3a5a7a;
      font-size: 14px;
      padding: 48px 0;
    }

    .loading-msg {
      color: #3a5a7a;
      font-size: 13px;
      padding: 40px 0;
      letter-spacing: 1px;
    }

    /* ── Tabs ── */
    .dash-tabs {
      display: flex;
      max-width: 1100px;
      margin: 0 auto 28px;
      border-bottom: 2px solid #1e3352;
    }
    .dash-tab {
      padding: 12px 28px;
      background: none;
      border: none;
      color: #7a9ab8;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }
    .dash-tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }
    .dash-tab:hover:not(.active) { color: #fff; }

    /* ── Reviews Admin ── */
    .reviews-admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1100px;
      margin: 0 auto 16px;
    }
    .reviews-admin-count {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a5a7a;
    }
    .review-admin-card {
      max-width: 1100px;
      margin: 0 auto 14px;
      background: #112032;
      border: 1px solid #1e3352;
      padding: 20px 24px;
      text-align: left;
    }
    .rac-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
    }
    .rac-author { font-size: 13px; font-weight: 700; color: #fff; }
    .rac-location { font-size: 11px; color: #5ba8d4; margin-top: 2px; }
    .rac-stars { color: #c9a84c; font-size: 13px; margin-top: 4px; }
    .rac-date { font-size: 10px; color: #3a5a7a; letter-spacing: 1px; margin-bottom: 8px; }
    .rac-badge {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .rac-badge.pending { background: #2d1a00; color: #f59e0b; border: 1px solid #92400e; }
    .rac-badge.approved { background: #0a1f0a; color: #4ade80; border: 1px solid #166534; }
    .rac-text {
      font-size: 13px;
      color: #a8c0d6;
      font-style: italic;
      line-height: 1.7;
      margin: 0 0 12px;
    }
    .rac-reply-existing {
      background: #0d1b2a;
      border-left: 3px solid #c9a84c;
      padding: 10px 14px;
      font-size: 12px;
      color: #7a9ab8;
      margin-bottom: 10px;
    }
    .rac-reply-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #c9a84c;
      display: block;
      margin-bottom: 4px;
    }
    .rac-reply-input {
      width: 100%;
      padding: 10px 14px;
      background: #0d1b2a;
      border: 1px solid #1e3352;
      color: #fff;
      font-size: 13px;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
      resize: vertical;
      min-height: 60px;
      transition: border-color 0.3s;
    }
    .rac-reply-input:focus { border-color: #c9a84c; }
    .rac-actions { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .btn-approve {
      padding: 7px 16px;
      background: none;
      border: 1px solid #166534;
      color: #4ade80;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-approve:hover { background: #166534; color: #fff; }
    .btn-save-reply {
      padding: 7px 16px;
      background: none;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save-reply:hover { background: #c9a84c; color: #000; }

    /* ── Price edit ── */
    .btn-edit-price {
      background: none;
      border: none;
      color: #3a5a7a;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 6px;
      transition: color 0.2s;
    }
    .btn-edit-price:hover { color: #c9a84c; }
    .price-input {
      width: 72px;
      padding: 4px 8px;
      background: #0d1b2a;
      border: 1px solid #c9a84c;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .btn-save-price {
      background: none;
      border: 1px solid #166534;
      color: #4ade80;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 4px;
    }
    .btn-save-price:hover { background: #166534; color: #fff; }
    .btn-cancel-price {
      background: none;
      border: 1px solid #4a2222;
      color: #cc4444;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 4px;
    }
    .btn-cancel-price:hover { background: #cc4444; color: #fff; }

    /* ── Pricing cards ── */
    .pricing-card {
      background: #112032;
      border: 1px solid #1e3352;
      padding: 20px 24px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .pricing-card-label { font-size: 13px; font-weight: 700; color: #fff; }
    .pricing-card-sub   { font-size: 11px; color: #5ba8d4; margin-top: 3px; }
    .pricing-card-right { display: flex; align-items: center; gap: 10px; }
    .pricing-dollar     { color: #c9a84c; font-size: 16px; font-weight: 700; }
    .pricing-input {
      width: 90px;
      padding: 9px 12px;
      background: #0d1b2a;
      border: 1px solid #1e3352;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }
    .pricing-input:focus { border-color: #c9a84c; }
    .pricing-save {
      padding: 9px 20px;
      background: #c9a84c;
      color: #000;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .pricing-save:hover { background: #e0c46c; }
    .pricing-saved { color: #4ade80; font-size: 11px; letter-spacing: 1px; display: none; }

    /* ── Summary bar ── */
    .summary-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      max-width: 1100px;
      margin: 0 auto 32px;
      border: 1px solid #1e3352;
      background: #112032;
    }
    .summary-item {
      flex: 1;
      padding: 20px;
      border-right: 1px solid #1e3352;
      text-align: center;
    }
    .summary-item:last-child { border-right: none; }
    .summary-num {
      font-size: 28px;
      font-weight: 700;
      color: #c9a84c;
      line-height: 1;
    }
    .summary-lbl {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5ba8d4;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<!-- LOGIN PANEL -->
<div id="login">
  <h2>Admin</h2>
  <p>Blue Star Limo Dashboard</p>
  <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
  <button onclick="checkLogin()">Sign In</button>
  <div id="login-error">Incorrect password. Please try again.</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="dash-header">
    <h1>Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Tabs -->
  <div class="dash-tabs">
    <button class="dash-tab active" onclick="showTab('trips')">Trips</button>
    <button class="dash-tab" onclick="showTab('reviews')">Reviews</button>
    <button class="dash-tab" onclick="showTab('pricing')">Pricing</button>
  </div>

  <!-- ── TRIPS TAB ── -->
  <div id="tab-trips">

  <!-- Summary -->
  <div class="summary-bar" id="summary-bar">
    <div class="summary-item">
      <div class="summary-num" id="sum-total">—</div>
      <div class="summary-lbl">Total Trips</div>
    </div>
    <div class="summary-item">
      <div class="summary-num" id="sum-jfk">—</div>
      <div class="summary-lbl">JFK</div>
    </div>
    <div class="summary-item">
      <div class="summary-num" id="sum-lga">—</div>
      <div class="summary-lbl">LGA</div>
    </div>
    <div class="summary-item">
      <div class="summary-num" id="sum-hvn">—</div>
      <div class="summary-lbl">HVN</div>
    </div>
    <div class="summary-item">
      <div class="summary-num" id="sum-revenue">—</div>
      <div class="summary-lbl">Total Revenue</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="dash-controls">
    <select id="filter" onchange="loadTrips()">
      <option value="">All Trips</option>
      <option value="JFK">JFK</option>
      <option value="LGA">LGA</option>
      <option value="HVN">HVN</option>
    </select>
    <button onclick="loadTrips()">Refresh</button>
  </div>

  <div class="trip-count" id="trip-count"></div>

  <div class="table-wrap">
    <div id="trips"><p class="loading-msg">Loading trips...</p></div>
  </div>

  </div><!-- end #tab-trips -->

  <!-- ── PRICING TAB ── -->
  <div id="tab-pricing" style="display:none;">
    <div style="max-width:640px;margin:0 auto;">
      <div class="reviews-admin-header" style="margin-bottom:20px;">
        <div class="reviews-admin-count">Set base fares per destination. Affects new bookings only.</div>
      </div>
      <div id="pricing-cards"><p class="loading-msg">Loading...</p></div>
    </div>
  </div>

  <!-- ── REVIEWS TAB ── -->
  <div id="tab-reviews" style="display:none;">
    <div class="reviews-admin-header">
      <div class="reviews-admin-count" id="reviews-count"></div>
      <button onclick="loadReviews()" style="padding:10px 24px;background:#c9a84c;color:#000;font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;">Refresh</button>
    </div>
    <div id="reviews-admin-list"><p class="loading-msg">Loading reviews...</p></div>
  </div>

</div><!-- end #dashboard -->


<script>
  // ── Auth ────────────────────────────────────────────────────
  function checkLogin() {
    const pw = document.getElementById("password").value;
    fetch("/api/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw })
    })
      .then(res => {
        if (res.ok) {
          document.getElementById("login").style.display = "none";
          document.getElementById("dashboard").style.display = "block";
          document.getElementById("login-error").style.display = "none";
          loadTrips();
          loadSummary();
        } else {
          document.getElementById("login-error").style.display = "block";
          document.getElementById("password").value = "";
        }
      })
      .catch(() => {
        document.getElementById("login-error").style.display = "block";
        document.getElementById("password").value = "";
      });
  }

  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") checkLogin();
  });

  function logout() {
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("login").style.display = "block";
    document.getElementById("password").value = "";
  }

  // ── Summary ─────────────────────────────────────────────────
  function loadSummary() {
    fetch("/api/trips")
      .then(r => r.json())
      .then(data => {
        const jfk = data.filter(t => t.destination === "JFK").length;
        const lga = data.filter(t => t.destination === "LGA").length;
        const hvn = data.filter(t => t.destination === "HVN").length;
        const rev = data.reduce((sum, t) => sum + (parseInt(t.price) || 0), 0);
        document.getElementById("sum-total").textContent   = data.length;
        document.getElementById("sum-jfk").textContent     = jfk;
        document.getElementById("sum-lga").textContent     = lga;
        document.getElementById("sum-hvn").textContent     = hvn;
        document.getElementById("sum-revenue").textContent = "$" + rev.toLocaleString();
      });
  }

  // ── Trips Table ──────────────────────────────────────────────
  function loadTrips() {
    const filter = document.getElementById("filter").value;
    const url = filter ? `/api/trips?destination=${filter}` : "/api/trips";

    document.getElementById("trips").innerHTML = '<p class="loading-msg">Loading...</p>';

    fetch(url)
      .then(r => r.json())
      .then(data => renderTable(data))
      .catch(() => {
        document.getElementById("trips").innerHTML =
          '<p class="no-trips">Could not connect to server.</p>';
      });
  }

  function renderTable(data) {
    const countEl = document.getElementById("trip-count");
    countEl.textContent = data.length
      ? `Showing ${data.length} trip${data.length !== 1 ? "s" : ""}`
      : "";

    if (data.length === 0) {
      document.getElementById("trips").innerHTML =
        '<p class="no-trips">No trips found.</p>';
      return;
    }

    let html = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Destination</th>
            <th>Date</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
    `;

    data.forEach(trip => {
      const rawPrice = parseInt(trip.price) || 0;
      const price = "$" + rawPrice.toLocaleString();
      const email = trip.email || "—";
      const phone = trip.phone || "—";
      html += `
        <tr>
          <td>${trip.id}</td>
          <td><strong style="color:#fff">${trip.first_name} ${trip.last_name}</strong></td>
          <td>${phone}</td>
          <td>${email}</td>
          <td>${trip.destination}</td>
          <td>${trip.date}</td>
          <td class="price" id="price-cell-${trip.id}">
            <span id="price-val-${trip.id}">${price}</span>
            <button class="btn-edit-price" title="Edit price" onclick="editTripPrice(${trip.id}, ${rawPrice})">✎</button>
          </td>
          <td>
            <a href="/api/invoice/${trip.id}" class="btn-invoice">Invoice PDF</a>
            <button class="btn-delete" onclick="deleteTrip(${trip.id})">Delete</button>
          </td>
        </tr>
      `;
    });

    html += "</tbody></table>";
    document.getElementById("trips").innerHTML = html;
  }

  // ── Delete Trip ──────────────────────────────────────────────
  function deleteTrip(id) {
    if (!confirm("Delete this trip? This cannot be undone.")) return;
    fetch(`/api/delete/${id}`, { method: "DELETE" })
      .then(() => { loadTrips(); loadSummary(); });
  }

  // ── Tab Switching ────────────────────────────────────────────
  function showTab(name) {
    document.getElementById("tab-trips").style.display   = name === "trips"   ? "" : "none";
    document.getElementById("tab-reviews").style.display = name === "reviews" ? "" : "none";
    document.getElementById("tab-pricing").style.display = name === "pricing" ? "" : "none";
    document.querySelectorAll(".dash-tab").forEach(function(btn, i) {
      btn.classList.toggle("active",
        (i === 0 && name === "trips") ||
        (i === 1 && name === "reviews") ||
        (i === 2 && name === "pricing")
      );
    });
    if (name === "reviews") loadReviews();
    if (name === "pricing") loadPricing();
  }

  // ── Inline Trip Price Editing ────────────────────────────────
  function editTripPrice(id, current) {
    document.getElementById("price-cell-" + id).innerHTML = `
      <input class="price-input" id="price-input-${id}" type="number" value="${current}" min="0">
      <button class="btn-save-price" onclick="saveTripPrice(${id})">✓</button>
      <button class="btn-cancel-price" onclick="loadTrips()">✗</button>
    `;
    document.getElementById("price-input-" + id).focus();
  }

  function saveTripPrice(id) {
    const price = parseInt(document.getElementById("price-input-" + id).value) || 0;
    fetch("/api/trips/" + id + "/price", {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ price })
    }).then(() => { loadTrips(); loadSummary(); });
  }

  // ── Destination Pricing ──────────────────────────────────────
  const PRICING_LABELS = {
    JFK: "JFK — John F. Kennedy International",
    LGA: "LGA — LaGuardia Airport",
    HVN: "HVN — Tweed New Haven Airport"
  };

  function loadPricing() {
    fetch("/api/pricing")
      .then(r => r.json())
      .then(renderPricing)
      .catch(() => {
        document.getElementById("pricing-cards").innerHTML =
          '<p class="no-trips">Could not load pricing.</p>';
      });
  }

  function renderPricing(data) {
    const dests = ["JFK", "LGA", "HVN"];
    const html = dests.map(dest => `
      <div class="pricing-card">
        <div>
          <div class="pricing-card-label">${dest}</div>
          <div class="pricing-card-sub">${PRICING_LABELS[dest]}</div>
        </div>
        <div class="pricing-card-right">
          <span class="pricing-dollar">$</span>
          <input class="pricing-input" id="p-${dest}" type="number"
                 value="${data[dest] !== undefined ? data[dest] : ''}" min="0" placeholder="0">
          <button class="pricing-save" onclick="saveDestPrice('${dest}')">Save</button>
          <span class="pricing-saved" id="saved-${dest}">Saved ✓</span>
        </div>
      </div>
    `).join("");
    document.getElementById("pricing-cards").innerHTML = html;
  }

  function saveDestPrice(dest) {
    const price = parseInt(document.getElementById("p-" + dest).value) || 0;
    fetch("/api/pricing/" + dest, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ price })
    }).then(r => r.json()).then(() => {
      const el = document.getElementById("saved-" + dest);
      el.style.display = "inline";
      setTimeout(() => { el.style.display = "none"; }, 2000);
    });
  }

  // ── Reviews ──────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function starsText(n) { return "★".repeat(n) + "☆".repeat(5 - n); }

  function loadReviews() {
    document.getElementById("reviews-admin-list").innerHTML = '<p class="loading-msg">Loading...</p>';
    fetch("/api/reviews/all")
      .then(r => r.json())
      .then(renderReviews)
      .catch(() => {
        document.getElementById("reviews-admin-list").innerHTML = '<p class="no-trips">Could not connect to server.</p>';
      });
  }

  function renderReviews(data) {
    const countEl = document.getElementById("reviews-count");
    const pending  = data.filter(r => !r.approved).length;
    countEl.textContent = data.length + " review" + (data.length !== 1 ? "s" : "") + (pending ? " · " + pending + " pending" : "");

    if (!data.length) {
      document.getElementById("reviews-admin-list").innerHTML = '<p class="no-trips">No reviews yet.</p>';
      return;
    }

    const html = data.map(rv => {
      const badge = rv.approved
        ? '<span class="rac-badge approved">Approved</span>'
        : '<span class="rac-badge pending">Pending</span>';
      const approveBtn = !rv.approved
        ? `<button class="btn-approve" onclick="approveReview(${rv.id})">Approve</button>` : "";
      const replySection = `
        ${rv.reply ? `<div class="rac-reply-existing"><span class="rac-reply-label">Your Reply</span>${esc(rv.reply)}</div>` : ""}
        <textarea class="rac-reply-input" id="reply-${rv.id}" placeholder="Write a reply...">${esc(rv.reply)}</textarea>
      `;
      return `
        <div class="review-admin-card" id="rac-${rv.id}">
          <div class="rac-top">
            <div>
              <div class="rac-author">${esc(rv.name)}</div>
              ${rv.location ? `<div class="rac-location">${esc(rv.location)}</div>` : ""}
              <div class="rac-stars">${starsText(rv.stars)}</div>
            </div>
            ${badge}
          </div>
          <div class="rac-date">${rv.created_at}</div>
          <p class="rac-text">${esc(rv.text)}</p>
          ${replySection}
          <div class="rac-actions">
            ${approveBtn}
            <button class="btn-save-reply" onclick="saveReply(${rv.id})">Save Reply</button>
            <button class="btn-delete" onclick="deleteReview(${rv.id})">Delete</button>
          </div>
        </div>
      `;
    }).join("");

    document.getElementById("reviews-admin-list").innerHTML = html;
  }

  function approveReview(id) {
    fetch(`/api/reviews/${id}/approve`, { method: "POST" })
      .then(() => loadReviews());
  }

  function saveReply(id) {
    const reply = document.getElementById("reply-" + id).value.trim();
    fetch(`/api/reviews/${id}/reply`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ reply: reply })
    }).then(() => loadReviews());
  }

  function deleteReview(id) {
    if (!confirm("Delete this review? This cannot be undone.")) return;
    fetch(`/api/reviews/${id}`, { method: "DELETE" })
      .then(() => loadReviews());
  }
</script>

</body>
</html>
